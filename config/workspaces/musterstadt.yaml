description_de: |
  Musterstadt ist ein fiktives Beispiel für eine Kleinstadt mit nur manuell
  gepflegten Indikatoren. Zeigt, dass OpenMobility OS auch ohne API-Datenquellen
  einsetzbar ist — z.B. wenn keine offenen Portale oder OSM-Daten in der nötigen
  Dichte vorliegen.
description_en: |
  Musterstadt is a fictional small-town example with manually maintained
  indicators only. It demonstrates that OpenMobility OS works without API data
  sources — for places without open data portals or dense OSM coverage.

