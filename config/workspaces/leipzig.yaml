slug: leipzig
name: Leipzig
kind: city
country_code: DE
region: Sachsen
language_code: de
timezone: Europe/Berlin
population: 616093
area_km2: 297.80
is_demo: true
default_zoom: 12

# Rough Leipzig bounding box (EPSG:4326)
bounds:
  west: 12.295
  south: 51.236
  east: 12.549
  north: 51.443

center:
  lon: 12.3731
  lat: 51.3397

description_de: |
  Leipzig ist die erste Demo-Instanz von OpenMobility OS und zeigt, wie offene
  Daten, strategische Ziele und datenbasierte Priorisierung zusammenwirken können.
  Alle Inhalte sind Beispieldaten. Für eine produktive Nutzung müssen Quellen,
  Gewichtungen und Maßnahmen von der Kommune validiert werden.
description_en: |
  Leipzig is the first demo workspace of OpenMobility OS. It illustrates how
  open data, strategic goals, and data-driven prioritization fit together. All
  content is illustrative — for production use, sources, weights, and measures
  must be validated by the municipality.

goals:
  - code: modal_shift_2030
    title_de: Modal-Split Umweltverbund bis 2030
    title_en: Sustainable transport modal split by 2030
    target_value: 70
    current_value: 60
    unit: "%"
    deadline_year: 2030
    rationale_de: Strategisches Ziel aus kommunalen Mobilitätsdokumenten.
    rationale_en: Strategic target from municipal mobility documents.

  - code: vision_zero_2030
    title_de: Vision Zero — keine Verkehrstoten bis 2030
    title_en: Vision Zero — no road fatalities by 2030
    target_value: 0
    current_value: 6
    unit: "pro Jahr / per year"
    deadline_year: 2030

  - code: bike_share_2030
    title_de: Radverkehrsanteil 25% bis 2030
    title_en: Bike mode share 25% by 2030
    target_value: 25
    current_value: 19
    unit: "%"
    deadline_year: 2030

data_sources:
  - name: OSM — Radnetz
    source_type: osm_overpass
    layer_kind: bike_network
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: bike_network

  - name: OSM — Hauptstraßen mit Tempolimit
    source_type: osm_overpass
    layer_kind: streets_with_speed
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    config:
      template: streets_with_speed

  - name: OSM — Haltestellen
    source_type: osm_overpass
    layer_kind: transit_stops
    license: ODbL
    config:
      template: transit_stops

  # GTFS feed: Germany-wide local transit (gtfs.de "nv_free"). Includes
  # LVB/MDV stops and routes for Leipzig as part of the nationwide
  # nv_free aggregate. CC BY 4.0. The same zip feeds all three derived
  # layers below — only the `layer` field differs.
  - name: GTFS — Stops (gtfs.de nv_free)
    source_type: gtfs
    layer_kind: transit_stops
    license: "CC BY 4.0"
    attribution: "gtfs.de — Germany Local Transit (nv_free)"
    source_url: https://gtfs.de/en/feeds/de_nv/
    config:
      url: https://download.gtfs.de/germany/nv_free/latest.zip
      layer: transit_stops
  - name: GTFS — Routes (gtfs.de nv_free)
    source_type: gtfs
    layer_kind: transit_routes
    license: "CC BY 4.0"
    attribution: "gtfs.de — Germany Local Transit (nv_free)"
    source_url: https://gtfs.de/en/feeds/de_nv/
    config:
      url: https://download.gtfs.de/germany/nv_free/latest.zip
      layer: transit_routes
  - name: GTFS — Coverage 400 m (gtfs.de nv_free)
    source_type: gtfs
    layer_kind: transit_coverage
    license: "CC BY 4.0"
    attribution: "gtfs.de — Germany Local Transit (nv_free)"
    source_url: https://gtfs.de/en/feeds/de_nv/
    config:
      url: https://download.gtfs.de/germany/nv_free/latest.zip
      layer: transit_coverage
      coverage_buffer_m: 400

  - name: OSM — Schulen
    source_type: osm_overpass
    layer_kind: schools
    license: ODbL
    config:
      template: schools

