  # Production: replace the demo source above by importing real Destatis
  # Unfallatlas data via the helper management command. Configure the per-year
  # download URLs in `config/unfallatlas.yaml` (or `config/unfallatlas/leipzig.yaml`)
  # and run, for example:
  #
  #   docker compose exec web python manage.py seed_unfallatlas \
  #       --workspace leipzig --years 2021-2024
  #
  # The command creates one `unfallat`-typed DataSource per year, clipped to
  # this workspace's bounding box, and replaces the illustrative demo layer.

  # BikeMaps.org — global crowdsourced cycling-incident reports. Bridges the
  # well-documented under-reporting gap of vulnerable-road-user incidents in
  # police statistics. Hazards are off by default (set include_hazards: true
  # to surface them too). Density of reports varies strongly by city; this
  # source will simply yield zero features in regions with no community
  # reporting yet — that is itself useful information for the operator.
  - name: BikeMaps.org — Crowdsourced cycling reports
    source_type: bikemaps
    layer_kind: accidents
    license: "CC BY 4.0"
    attribution: "© BikeMaps.org contributors"
    source_url: https://bikemaps.org/
    config:
      include_collisions: true
      include_near_misses: true
      include_hazards: false

  # Districts come from OSM (admin_level 9 = Stadtbezirk, 10 = Ortsteil). The
  # OSM connector assembles the relation members into closed polygons. Sync
  # this datasource once on first boot to populate the layer; if Overpass is
  # unavailable, the layer simply stays empty and the rest of the map keeps
  # working.
  - name: OSM — Stadtbezirke / Ortsteile
    source_type: osm_overpass
    layer_kind: districts
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: districts

measures:
  - slug: promenadenring-protected-lane
    category: bike_infra
    title_de: Geschützter Radweg auf dem Promenadenring
    title_en: Protected bike lane on the Promenadenring
    summary_de: Durchgehender geschützter Radweg als sichtbares Leuchtturmprojekt im Zentrum.
    summary_en: Continuous protected bike lane as a visible lighthouse project in the city center.
    effort_level: major
    status: proposed
    description_de_md: |
      ## Vorschlag
      Der Promenadenring umschließt die Leipziger Innenstadt und ist eine zentrale
      Nord-Süd- und Ost-West-Achse für den Radverkehr. Ein durchgehender, baulich
      geschützter Radweg würde Sicherheit erhöhen und das Rückgrat des Radnetzes stärken.

      ## Datenbasis
      - OSM Radnetz (Überpass)
      - Hauptverkehrsstraßen mit Tempolimit

      ## Unsicherheiten
      - Konkrete Flächenaufteilung hängt von Beteiligungsprozessen ab.
    description_en_md: |
      ## Proposal
      The Promenadenring surrounds the Leipzig city center and is a central
      cycling axis. A continuous, physically protected bike lane would improve
      safety and form the backbone of the bike network.
    scores:
      climate: { raw: 0.75, rationale_de: "Verschiebung vom MIV zum Rad.", rationale_en: "Shift from car to bike." }
      safety: { raw: 0.85, confidence: high }
      quality_of_life: { raw: 0.75 }
      social: { raw: 0.6 }
      feasibility: { raw: 0.5 }
      cost: { raw: 0.4 }
      visibility: { raw: 0.9, confidence: high }
      political: { raw: 0.55 }
      goal_alignment: { raw: 0.8 }

  - slug: school-street-pilot-grunau
    category: school_routes
    title_de: Schulstraßen-Pilot in Grünau
    title_en: School streets pilot in Grünau
    summary_de: Zeitweise Sperrung der Zufahrtsstraßen ausgewählter Schulen vor Unterrichtsbeginn.
    summary_en: Temporary closure of access streets to selected schools at start/end times.
    effort_level: quick_win
    status: proposed
    description_de_md: |
      ## Vorschlag
      Pilotprojekt an drei Schulen in Grünau mit zeitweiser Sperrung zu Schulbeginn/-ende.
      Nach Auswertung: Ausrollen auf weitere Standorte.
    description_en_md: |
      ## Proposal
      Pilot at three schools in Grünau with timed closures at start/end of school.
    scores:
      climate: { raw: 0.4 }
      safety: { raw: 0.9, confidence: high }
      quality_of_life: { raw: 0.75 }
      social: { raw: 0.8, confidence: high }
      feasibility: { raw: 0.8 }
      cost: { raw: 0.9 }
      visibility: { raw: 0.75 }
      political: { raw: 0.6 }
      goal_alignment: { raw: 0.65 }

