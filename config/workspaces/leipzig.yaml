  - name: OSM — Versiegelte Flächen (Näherung)
    source_type: osm_overpass
    layer_kind: sealed_surfaces
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: sealed_surfaces

  # Illustrative heat / fresh-air corridors so the climate story views render
  # even fully offline. Replace with the municipality's Klimaanalyse /
  # Frischluftbahnen dataset (often a WFS) for production use.
  - name: Beispiel — Frischluft-/Hitzekorridore (Demo-Daten)
    source_type: manual
    layer_kind: heat_corridors
    license: "CC0 (example data — not a real climate analysis)"
    attribution: "Illustrative demo data only"
    config:
      feature_collection:
        type: FeatureCollection
        features:
          - type: Feature
            properties: {name: "Frischluftbahn Auwald", note: "illustrative"}
            geometry:
              type: Polygon
              coordinates: [[[12.330, 51.330], [12.360, 51.330], [12.360, 51.360], [12.330, 51.360], [12.330, 51.330]]]
          - type: Feature
            properties: {name: "Hitzekorridor Zentrum-Ost", note: "illustrative"}
            geometry:
              type: Polygon
              coordinates: [[[12.395, 51.335], [12.420, 51.335], [12.420, 51.352], [12.395, 51.352], [12.395, 51.335]]]

  # Illustrative flood-hazard zones near the Weiße Elster / Pleiße floodplain.
  # Replace with the Saxony LfULG Überschwemmungsgebiete WFS (see below).
  - name: Beispiel — Überschwemmungsgebiete (Demo-Daten)
    source_type: manual
    layer_kind: flood_risk
    license: "CC0 (example data — not official flood zones)"
    attribution: "Illustrative demo data only"
    config:
      feature_collection:
        type: FeatureCollection
        features:
          - type: Feature
            properties: {name: "HQ100 Weiße Elster", return_period: "100a", note: "illustrative"}
            geometry:
              type: Polygon
              coordinates: [[[12.335, 51.300], [12.355, 51.300], [12.358, 51.345], [12.338, 51.345], [12.335, 51.300]]]
          - type: Feature
            properties: {name: "HQ100 Pleiße", return_period: "100a", note: "illustrative"}
            geometry:
              type: Polygon
              coordinates: [[[12.375, 51.305], [12.390, 51.305], [12.392, 51.335], [12.377, 51.335], [12.375, 51.305]]]

  # ---- Optional German federal & municipal portals -----------------------
  # The following commented-out examples are ready to enable once a
  # municipality has confirmed the live URLs / package IDs. They are
  # documented inline rather than activated by default so that fresh
  # `docker compose up` never depends on third-party uptime.
  #
  # Bundesnetzagentur Ladesäulenregister (every public charger in Germany,
  # weekly CSV download). Replace `<latest-csv-url>` with the current link
  # from https://www.bundesnetzagentur.de/DE/Fachthemen/ElektrizitaetundGas
  # /E-Mobilitaet/Ladesaeulenkarte/start.html
  #
  # - name: BNetzA — Ladesäulenregister Deutschland
  #   source_type: csv
  #   layer_kind: ev_charging
  #   license: "DL-DE BY 2.0"
  #   attribution: "Bundesnetzagentur"
  #   config:
  #     url: <latest-csv-url>
  #     delimiter: ";"
  #     encoding: cp1252
  #     lat_col: Breitengrad
  #     lon_col: Längengrad
  #
  # Umweltbundesamt Luftqualität — REST endpoint per pollutant. Returns
  # measurement stations with the latest aggregate values. The exact path
  # changes per UBA release; check
  # https://www.umweltbundesamt.de/daten/luft/luftdaten#vorberichteapi
  #
  # - name: UBA — Luftqualitätsmessstationen
  #   source_type: rest
  #   layer_kind: air_quality
  #   license: "DL-DE BY 2.0"
  #   attribution: "Umweltbundesamt"
  #   config:
  #     url: https://www.umweltbundesamt.de/api/air_data/v3/stations/json
  #     json_path: stations
  #     geometry_mapping: { lat: latitude, lon: longitude }
  #
  # opendata.leipzig.de (CKAN) — Radzählstellen (monthly cycle counters).
  # Drop in the actual package_id from the portal browser:
  #
  # - name: opendata.leipzig.de — Radzählstellen
  #   source_type: ckan
  #   layer_kind: cycling_counts
  #   license: "DL-DE BY 2.0"
  #   attribution: "Stadt Leipzig"
  #   source_url: https://opendata.leipzig.de/
  #   config:
  #     portal_url: https://opendata.leipzig.de
  #     package_id: radzaehlstellen
  #
  # Mobilithek (BMDV) — bundesweite GTFS-RT für ÖV. Open distributions
  # work today; subscriber-only feeds (e.g. DATEX II Roadworks) need an
  # operator-issued client cert.
  #
  # - name: Mobilithek — DELFI bundesweites GTFS
  #   source_type: mobilithek
  #   layer_kind: transit_stops
  #   license: "CC BY 4.0"
  #   attribution: "DELFI e. V. / BMDV"
  #   source_url: https://mobilithek.info/
  #   config:
  #     distribution_url: <Mobilithek distribution URL>
  #     format_hint: gtfs
  #     inner_options: { layer: transit_stops }
  #
  # Zensus 2022 — 100 m population grid (Destatis). Download the CSV from
  # https://www.zensus2022.de → Ergebnisse → Gitterzellen. The file is
  # ~800 MB nationwide; the connector clips to the workspace bbox
  # automatically so only Leipzig cells are stored.
  #
  # - name: Zensus 2022 — Bevölkerungsraster 100 m
  #   source_type: zensus_grid
  #   layer_kind: population_grid
  #   license: "DL-DE BY 2.0"
  #   attribution: "Statistisches Bundesamt (Destatis), Zensus 2022"
  #   source_url: https://www.zensus2022.de/
  #   config:
  #     url: <Zensus 2022 grid CSV download URL>
  #     grid_id_column: Gitter_ID_100m
  #     indicator_columns: ["Einwohner", "Alter_unter_18", "Alter_65_und_aelter"]
  #     min_population: 1
  #
  # ---- Climate adaptation: official live sources -------------------------
  # These replace the illustrative demo layers above with authoritative data.
  # Left commented so a fresh `docker compose up` never depends on third-party
  # uptime; an operator enables them once the live URLs are confirmed.
  #
  # Sachsen LfULG — Überschwemmungsgebiete (statutory flood zones, WFS).
  # Browse layers at https://www.umwelt.sachsen.de/umwelt/infosysteme/ida/
  #
  # - name: LfULG Sachsen — Überschwemmungsgebiete (HQ100)
  #   source_type: wfs
  #   layer_kind: flood_risk
  #   license: "DL-DE BY 2.0"
  #   attribution: "© Freistaat Sachsen, LfULG"
  #   source_url: https://www.umwelt.sachsen.de/
  #   config:
  #     url: <LfULG WFS GetCapabilities URL>
  #     type_name: <ueberschwemmungsgebiete-layer>
  #     srs: EPSG:4326
  #
  # opendata.leipzig.de (CKAN) — Straßenbaumkataster (full municipal tree
  # cadastre, far richer than OSM). Drop in the package_id from the portal:
  #
  # - name: opendata.leipzig.de — Straßenbaumkataster
  #   source_type: ckan
  #   layer_kind: trees
  #   license: "DL-DE BY 2.0"
  #   attribution: "Stadt Leipzig"
  #   source_url: https://opendata.leipzig.de/
  #   config:
  #     portal_url: https://opendata.leipzig.de
  #     package_id: strassenbaumkataster
  #
  # DWD — Klimakennzahlen (Hitze-/Sommertage, Trockenheitsindex) als Raster
  # oder Stationsdaten. Open Data via https://opendata.dwd.de/
  #
  # - name: DWD — Hitzetage & Trockenheitsindex
  #   source_type: dwd_climate
  #   layer_kind: drought_risk
  #   license: "GeoNutzV / DWD Open Data"
  #   attribution: "Deutscher Wetterdienst (DWD)"
  #   source_url: https://opendata.dwd.de/
  #   config:
  #     url: <DWD Open Data CSV / grid URL>

measures:
  - slug: promenadenring-protected-lane
    category: bike_infra
    title_de: Geschützter Radweg auf dem Promenadenring
    title_en: Protected bike lane on the Promenadenring
    summary_de: Durchgehender geschützter Radweg als sichtbares Leuchtturmprojekt im Zentrum.
    summary_en: Continuous protected bike lane as a visible lighthouse project in the city center.
    effort_level: major
    status: proposed
    description_de_md: |
      ## Vorschlag
      Der Promenadenring umschließt die Leipziger Innenstadt und ist eine zentrale
      Nord-Süd- und Ost-West-Achse für den Radverkehr. Ein durchgehender, baulich
      geschützter Radweg würde Sicherheit erhöhen und das Rückgrat des Radnetzes stärken.

      ## Datenbasis
      - OSM Radnetz (Überpass)
      - Hauptverkehrsstraßen mit Tempolimit

      ## Unsicherheiten
      - Konkrete Flächenaufteilung hängt von Beteiligungsprozessen ab.
    description_en_md: |
      ## Proposal
      The Promenadenring surrounds the Leipzig city center and is a central
      cycling axis. A continuous, physically protected bike lane would improve
      safety and form the backbone of the bike network.
    scores:
      climate: { raw: 0.75, rationale_de: "Verschiebung vom MIV zum Rad.", rationale_en: "Shift from car to bike." }
      safety: { raw: 0.85, confidence: high }
      quality_of_life: { raw: 0.75 }
      social: { raw: 0.6 }
      feasibility: { raw: 0.5 }
      cost: { raw: 0.4 }
      visibility: { raw: 0.9, confidence: high }
      political: { raw: 0.55 }
      goal_alignment: { raw: 0.8 }

