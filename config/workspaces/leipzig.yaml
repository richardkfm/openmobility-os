  # Production: replace the demo source above by importing real Destatis
  # Unfallatlas data via the helper management command. Configure the per-year
  # download URLs in `config/unfallatlas.yaml` (or `config/unfallatlas/leipzig.yaml`)
  # and run, for example:
  #
  #   docker compose exec web python manage.py seed_unfallatlas \
  #       --workspace leipzig --years 2021-2024
  #
  # The command creates one `unfallat`-typed DataSource per year, clipped to
  # this workspace's bounding box, and replaces the illustrative demo layer.

  # BikeMaps.org — global crowdsourced cycling-incident reports. Bridges the
  # well-documented under-reporting gap of vulnerable-road-user incidents in
  # police statistics. Hazards are off by default (set include_hazards: true
  # to surface them too). Density of reports varies strongly by city; this
  # source will simply yield zero features in regions with no community
  # reporting yet — that is itself useful information for the operator.
  - name: BikeMaps.org — Crowdsourced cycling reports
    source_type: bikemaps
    layer_kind: accidents
    license: "CC BY 4.0"
    attribution: "© BikeMaps.org contributors"
    source_url: https://bikemaps.org/
    config:
      include_collisions: true
      include_near_misses: true
      include_hazards: false

  # Districts come from OSM (admin_level 9 = Stadtbezirk, 10 = Ortsteil). The
  # OSM connector assembles the relation members into closed polygons. Sync
  # this datasource once on first boot to populate the layer; if Overpass is
  # unavailable, the layer simply stays empty and the rest of the map keeps
  # working.
  - name: OSM — Stadtbezirke / Ortsteile
    source_type: osm_overpass
    layer_kind: districts
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: districts

  # ---- Decision-support overlays -----------------------------------------
  # These layers populate the equity and electrification scoring rationales.
  # All are stock OSM templates — no per-city API keys needed.

  - name: OSM — Kindergärten / Kitas
    source_type: osm_overpass
    layer_kind: public_buildings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: kindergartens

  - name: OSM — Krankenhäuser & Kliniken
    source_type: osm_overpass
    layer_kind: public_buildings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: hospitals

  - name: OSM — Öffentliche Einrichtungen
    source_type: osm_overpass
    layer_kind: public_buildings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: public_buildings

  - name: OSM — Fußgängerüberwege
    source_type: osm_overpass
    layer_kind: pedestrian_crossings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: pedestrian_crossings

  - name: OSM — Ladepunkte (Elektromobilität)
    source_type: osm_overpass
    layer_kind: ev_charging
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: ev_chargers_osm

  # ---- Climate-readiness layers (heat, drought, water) -------------------
  # OSM-derived layers below are synced automatically by `seed_demo` (they
  # hit the Overpass network; a failure only warns). Together they feed the
  # "Urban heat & shade", "Cooling green network" and "Flood & water
  # resilience" story views and the heat-vulnerability measure rule.

  - name: OSM — Baumkataster (Einzelbäume)
    source_type: osm_overpass
    layer_kind: trees
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
