slug: utrecht
name: Utrecht
kind: city
country_code: NL
region: Utrecht
language_code: nl
timezone: Europe/Amsterdam
population: 361924
area_km2: 99.21
is_demo: true
default_zoom: 13

# Rough Utrecht bounding box (EPSG:4326)
bounds:
  west: 5.03
  south: 52.04
  east: 5.18
  north: 52.13

center:
  lon: 5.1214
  lat: 52.0907

description_de: |
  Utrecht ist die zweite reale Demo-Instanz von OpenMobility OS und zeigt,
  wie die Plattform international funktioniert. Utrecht ist weltbekannt fuer
  seine vorbildliche Radverkehrsinfrastruktur und ambitionierte
  Mobilitaetspolitik. Alle Inhalte sind Beispieldaten. Fuer eine produktive
  Nutzung muessen Quellen, Gewichtungen und Massnahmen von der Kommune
  validiert werden.
description_en: |
  Utrecht is the second real-city demo workspace of OpenMobility OS, showing
  that the platform works internationally. Utrecht is world-renowned for its
  exemplary cycling infrastructure and ambitious mobility policy. All content
  is illustrative — for production use, sources, weights, and measures must
  be validated by the municipality.

goals:
  - code: modal_shift_2030
    title_de: Modal-Split Umweltverbund bis 2030
    title_en: Sustainable transport modal split by 2030
    target_value: 73
    current_value: 60
    unit: "%"
    deadline_year: 2030
    rationale_de: "Strategisches Ziel aus dem Mobiliteitsplan Utrecht 2040. Aktuell ca. 60 % (Rad 33 % + OeV 10 % + Fuss 17 %)."
    rationale_en: "Strategic target from Mobiliteitsplan Utrecht 2040. Currently ~60 % (bike 33 % + transit 10 % + walking 17 %)."
    source_url: https://www.utrecht.nl/bestuur-en-organisatie/beleid/mobiliteit/

  - code: vision_zero_2035
    title_de: Vision Zero — keine Verkehrstoten bis 2035
    title_en: Vision Zero — zero road fatalities by 2035
    target_value: 0
    current_value: 4
    unit: "pro Jahr / per year"
    deadline_year: 2035
    rationale_de: "Niederlaendischer Strategisch Plan Verkeersveiligheid (SPV 2030). Utrecht hatte zuletzt ca. 4 Verkehrstote pro Jahr."
    rationale_en: "Dutch Strategisch Plan Verkeersveiligheid (SPV 2030). Utrecht had ~4 fatalities per year in recent years."
    source_url: https://www.rijksoverheid.nl/onderwerpen/verkeersveiligheid

  - code: bike_share_2030
    title_de: Radverkehrsanteil 40 % bis 2030
    title_en: Cycling mode share 40% by 2030
    target_value: 40
    current_value: 33
    unit: "%"
    deadline_year: 2030
    rationale_de: "Utrecht Fietsvisie 2020–2030. Aktueller Radverkehrsanteil ca. 33 %."
    rationale_en: "Utrecht Fietsvisie 2020–2030. Current cycling mode share ~33 %."
    source_url: https://www.utrecht.nl/bestuur-en-organisatie/beleid/mobiliteit/fiets/

  - code: car_share_2030
    title_de: MIV-Anteil unter 30 % bis 2030
    title_en: Car mode share below 30% by 2030
    target_value: 30
    current_value: 40
    unit: "%"
    deadline_year: 2030
    rationale_de: "Mobiliteitsplan Utrecht und nationales Klimaatakkoord."
    rationale_en: "Mobiliteitsplan Utrecht and national Klimaatakkoord."
    source_url: https://www.utrecht.nl/bestuur-en-organisatie/beleid/mobiliteit/

  - code: car_free_center_2030
    title_de: Reduktion MIV-Verkehr Innenstadt bis 2030
    title_en: Inner-city car traffic reduction by 2030
    target_value: 80
    current_value: 50
    unit: "% Reduktion / % reduction vs 2019"
    deadline_year: 2030
    rationale_de: "Utrechts Programm Autoluwe Binnenstad — autoarme Innenstadt."
    rationale_en: "Utrecht's Autoluwe Binnenstad (car-light inner city) programme."
    source_url: https://www.utrecht.nl/wonen-en-leven/verkeer/autoluwe-binnenstad/

  - code: fietsersbond_score
    title_de: Fietsersbond Zufriedenheitswert
    title_en: Fietsersbond cycling satisfaction score
    target_value: 7.5
    current_value: 7.1
    unit: "Note / score (1–10)"
    rationale_de: "Jaehrliche Erhebung des Fietsersbond. Skala 1–10 (hoeher = besser). Utrecht: 7,1."
    rationale_en: "Annual Fietsersbond survey. Scale 1–10 (higher is better). Utrecht: 7.1."
    source_url: https://www.fietsersbond.nl/

data_sources:
  - name: OSM — Bike network
    source_type: osm_overpass
    layer_kind: bike_network
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: bike_network

  - name: OSM — Streets with speed limits
    source_type: osm_overpass
    layer_kind: streets_with_speed
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    config:
      template: streets_with_speed

  - name: OSM — Transit stops
    source_type: osm_overpass
    layer_kind: transit_stops
    license: ODbL
    config:
      template: transit_stops

  # GTFS feed: Netherlands-wide public transit (OVapi). Covers U-OV (bus/tram),
  # NS (rail), and all other Dutch operators. CC0. The file is large (~1 GB);
  # the connector clips to the workspace bounds automatically. Not auto-synced
  # on seed (so a fresh `docker compose up` never depends on third-party
  # uptime) — an operator hits "Sync" in the data hub to pull real transit.
  - name: GTFS — Stops (OVapi NL)
    source_type: gtfs
    layer_kind: transit_stops
    license: "CC0"
    attribution: "OVapi.nl — Netherlands public transit"
    source_url: https://gtfs.ovapi.nl/
    provenance: live
    config:
      url: https://gtfs.ovapi.nl/nl/gtfs-nl.zip
      layer: transit_stops
  - name: GTFS — Routes (OVapi NL)
    source_type: gtfs
    layer_kind: transit_routes
    license: "CC0"
    attribution: "OVapi.nl — Netherlands public transit"
    source_url: https://gtfs.ovapi.nl/
    provenance: live
    config:
      url: https://gtfs.ovapi.nl/nl/gtfs-nl.zip
      layer: transit_routes
  - name: GTFS — Coverage 400 m (OVapi NL)
    source_type: gtfs
    layer_kind: transit_coverage
    license: "CC0"
    attribution: "OVapi.nl — Netherlands public transit"
    source_url: https://gtfs.ovapi.nl/
    provenance: live
    config:
      url: https://gtfs.ovapi.nl/nl/gtfs-nl.zip
      layer: transit_coverage
      coverage_buffer_m: 400

  - name: OSM — Schools
    source_type: osm_overpass
    layer_kind: schools
    license: ODbL
    config:
      template: schools

  # Demo accident data spread across 2021–2025 so the year filter on the map
  # is meaningful out of the box. Replace with the BRON connector or a Dutch
  # accident CSV for production use.
  - name: Demo — Accidents (illustrative data 2021–2025)
    source_type: manual
    layer_kind: accidents
    license: "CC0 (example data — not real accident records)"
