  # Production: replace the demo source above by importing real BRON
  # (Bestand geRegistreerde Ongevallen Nederland) data from Rijkswaterstaat.
  # BRON is the Dutch national accident registry. Download CSV from:
  # https://data.overheid.nl/ → search "BRON verkeersongevallen"

  # BikeMaps.org — global crowdsourced cycling-incident reports. Coverage in
  # the Netherlands varies; this source will yield zero features in regions
  # without community reporting — useful information for the operator.
  - name: BikeMaps.org — Crowdsourced cycling reports
    source_type: bikemaps
    layer_kind: accidents
    license: "CC BY 4.0"
    attribution: "© BikeMaps.org contributors"
    source_url: https://bikemaps.org/
    config:
      include_collisions: true
      include_near_misses: true
      include_hazards: false

  # Districts come from OSM. In the Netherlands, admin_level 9 maps to "wijk"
  # (neighborhood) and admin_level 10 to "buurt" (sub-neighborhood). The same
  # template used for Leipzig's Stadtbezirke/Ortsteile works globally.
  - name: OSM — Wijken / Buurten (districts)
    source_type: osm_overpass
    layer_kind: districts
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: districts

  # ---- Decision-support overlays -----------------------------------------
  # These layers populate the equity and electrification scoring rationales.
  # All are stock OSM templates — no per-city API keys needed.

  - name: OSM — Kindergartens / crèches
    source_type: osm_overpass
    layer_kind: public_buildings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: kindergartens

  - name: OSM — Hospitals & clinics
    source_type: osm_overpass
    layer_kind: public_buildings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: hospitals

  - name: OSM — Public buildings & amenities
    source_type: osm_overpass
    layer_kind: public_buildings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: public_buildings

  - name: OSM — Pedestrian crossings
    source_type: osm_overpass
    layer_kind: pedestrian_crossings
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: pedestrian_crossings

  - name: OSM — EV charging stations
    source_type: osm_overpass
    layer_kind: ev_charging
    license: ODbL
    attribution: "© OpenStreetMap contributors"
    source_url: https://www.openstreetmap.org/
    config:
      template: ev_chargers_osm

  # ---- Optional Dutch national & municipal portals ----------------------
  # The following commented-out examples are ready to enable once an
  # operator has confirmed the live URLs. They are documented inline so
  # that fresh `docker compose up` never depends on third-party uptime.
  #
  # NDOV Loket / OVapi — real-time GTFS for Netherlands public transit.
  #
  # - name: OVapi — GTFS-RT Netherlands
  #   source_type: gtfs
  #   layer_kind: transit_stops
  #   license: "CC0"
  #   attribution: "OVapi.nl"
  #   source_url: https://gtfs.ovapi.nl/
  #   config:
  #     url: https://gtfs.ovapi.nl/nl/gtfs-nl.zip
  #     layer: transit_stops
  #
  # opendata.utrecht.nl (CKAN) — municipal open data portal. Example:
  # cycling count data, parking occupancy, air quality.
  #
  # - name: opendata.utrecht.nl — Fietsteldata
  #   source_type: ckan
  #   layer_kind: cycling_counts
  #   license: "CC0"
  #   attribution: "Gemeente Utrecht"
  #   source_url: https://opendata.utrecht.nl/
  #   config:
  #     portal_url: https://ckan.dataplatform.nl
  #     package_id: <package-id>
  #
  # CBS StatLine — Dutch national statistics (demographics, modal split).
  #
  # - name: CBS — Bevolking per wijk
  #   source_type: rest
  #   layer_kind: demographics
  #   license: "CC BY 4.0"
  #   attribution: "Centraal Bureau voor de Statistiek"
  #   source_url: https://opendata.cbs.nl/
  #   config:
  #     url: <CBS StatLine OData URL>
  #     json_path: value
  #     geometry_mapping: { lat: latitude, lon: longitude }

measures:
  - slug: domplein-car-free-expansion
    category: public_space
    title_de: Autofreie Zone um den Domplein erweitern
    title_en: Expand the car-free zone around Domplein
    summary_de: Erweiterung der autofreien Innenstadt auf angrenzende Strassen rund um Domplein, Oudegracht und Twijnstraat.
    summary_en: Extend the existing car-free core around Dom Square to adjacent streets, creating a continuous pedestrian-cycling zone.
    effort_level: major
    status: proposed
    description_de_md: |
      ## Vorschlag
