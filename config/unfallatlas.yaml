# Unfallatlas (German Federal Statistics Office) source URLs
# ---------------------------------------------------------------------------
# Year → CSV download URL mapping consumed by the `seed_unfallatlas`
# management command. Each annual Unfallatlas file is published under the
# "dl-de/by-2-0" license and covers ALL of Germany.
#
# The URLs below point at the NRW open-geodata mirror, which hosts the full
# nationwide files at stable, predictable paths (unlike the official Destatis
# portal at https://unfallatlas.statistikportal.de, whose download links
# rotate each release cycle). If a year 404s, check the current filename at
# the portal listing linked below and update it here.
#
# RUNNING
#   python manage.py seed_unfallatlas --workspace <slug> --years 2021,2022,2023
#
# Per-workspace overrides: drop a file at config/unfallatlas/<slug>.yaml
# with the same shape and it takes precedence over this file.

default_encoding: utf-8

# ---------------------------------------------------------------------------
# NATIONWIDE source — covers every German municipality (incl. Leipzig/Sachsen)
#
# The authoritative Unfallatlas files are mirrored, per calendar year, on the
# NRW open-geodata portal (despite the NRW domain, each file is the FULL
# Germany dataset). These URLs are far more stable than the rotating Destatis
# download links. The CSV inside carries WGS84 columns (XGCSWGS84/YGCSWGS84),
# which this connector reads; the data is clipped to each workspace's bounding
# box on sync.
#
# To add a year to a workspace, use the data hub's "Add data source" form
# (connector: Unfallatlas) and paste the URL — or run:
#   python manage.py seed_unfallatlas --workspace <slug> --years 2023
#
# Verify the current filenames at:
#   https://www.opengeodata.nrw.de/produkte/transport_verkehr/unfallatlas/
sources:
  2020:
    url: "https://www.opengeodata.nrw.de/produkte/transport_verkehr/unfallatlas/Unfallorte2020_EPSG25832_CSV.zip"
  2021:
    url: "https://www.opengeodata.nrw.de/produkte/transport_verkehr/unfallatlas/Unfallorte2021_EPSG25832_CSV.zip"
  2022:
    url: "https://www.opengeodata.nrw.de/produkte/transport_verkehr/unfallatlas/Unfallorte2022_EPSG25832_CSV.zip"
  2023:
    url: "https://www.opengeodata.nrw.de/produkte/transport_verkehr/unfallatlas/Unfallorte2023_EPSG25832_CSV.zip"
