name: Bug Report
description: Something is broken or behaving unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Start the platform with `docker compose up --build`
        2. Navigate to `/<workspace-slug>/measures/`
        3. Click …
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Platform version
      description: Content of the `VERSION` file in the repository root.
      placeholder: "0.1.0"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Deployment environment
      description: Docker version, OS, any custom `.env` settings relevant to the bug.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell
    validations:
      required: false
